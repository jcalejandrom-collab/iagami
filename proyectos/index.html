<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#f0faf5;color:#1a3d2b;line-height:1.6}

/* ===== NAV ===== */
.nav{background:#fff;border-bottom:1px solid #c8ead8;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(29,107,62,.06)}
.navinner{max-width:1200px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none}
.logo-icon{width:38px;height:38px;background:#1d6b3e;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;color:#1a3d2b;line-height:1.1}
.logo-sub{font-size:10px;color:#4a8a6a;font-weight:400;display:block}
.back-link{display:flex;align-items:center;gap:6px;font-size:13px;color:#1d6b3e;text-decoration:none;font-weight:500;padding:6px 14px;border-radius:8px;border:1.5px solid #a8dfc0;transition:.15s;white-space:nowrap}
.back-link:hover{background:#e8f5ee}

/* ===== HERO ===== */
.hero{background:linear-gradient(135deg,#1a3d2b 0%,#1d6b3e 50%,#22854d 100%);padding:64px 24px 56px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-content{position:relative;z-index:1;max-width:700px;margin:0 auto}
.hero-emoji{font-size:52px;display:block;margin-bottom:16px}
.hero h1{font-family:'Poppins',sans-serif;font-size:clamp(26px,5vw,40px);font-weight:800;color:#fff;margin-bottom:12px}
.hero p{font-size:16px;color:rgba(255,255,255,.8);max-width:560px;margin:0 auto}

/* ===== STATS BAR ===== */
.stats-bar{background:#fff;border-bottom:1.5px solid #d4edd8;padding:0 24px}
.stats-inner{max-width:1200px;margin:0 auto;display:flex;gap:0;overflow-x:auto}
.stat-item{padding:18px 32px;display:flex;flex-direction:column;align-items:center;border-right:1px solid #e8f5ee;min-width:140px;flex:1;cursor:default;transition:.15s}
.stat-item:last-child{border-right:none}
.stat-item:hover{background:#f0faf5}
.stat-num{font-family:'Poppins',sans-serif;font-size:28px;font-weight:800;color:#1d6b3e;line-height:1}
.stat-label{font-size:11px;color:#4a8a6a;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* ===== MAIN ===== */
.main{max-width:1200px;margin:0 auto;padding:36px 24px 80px}

/* ===== FILTER TABS ===== */
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.ftab{padding:9px 20px;border-radius:30px;border:1.5px solid #d4edd8;background:#fff;color:#4a8a6a;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif}
.ftab:hover{border-color:#1d6b3e;color:#1d6b3e;background:#f0faf5}
.ftab.active{background:#1d6b3e;color:#fff;border-color:#1d6b3e}
.ftab .count{display:inline-block;background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px;font-weight:600}
.ftab:not(.active) .count{background:#e8f5ee;color:#1d6b3e}

/* ===== PROJECTS GRID ===== */
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:1024px){.projects-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.projects-grid{grid-template-columns:1fr}}

/* ===== PROJECT CARD ===== */
.proj-card{background:#fff;border-radius:16px;border:1.5px solid #d4edd8;overflow:hidden;transition:.2s;cursor:pointer;display:flex;flex-direction:column}
.proj-card:hover{border-color:#1d6b3e;box-shadow:0 8px 32px rgba(29,107,62,.12);transform:translateY(-3px)}
.proj-card:active{transform:scale(0.98)}
.proj-image{height:140px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;flex-shrink:0}
.proj-image.ejecucion{background:linear-gradient(135deg,#1e40af,#3b82f6)}
.proj-image.completado{background:linear-gradient(135deg,#1d6b3e,#4ade80)}
.proj-image.planificado{background:linear-gradient(135deg,#4b5563,#9ca3af)}
.proj-body{padding:20px;flex:1;display:flex;flex-direction:column;gap:12px}
.proj-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.proj-name{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;color:#1a3d2b;line-height:1.3;flex:1}
.status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.status-badge.ejecucion{background:#dbeafe;color:#1d4ed8}
.status-badge.completado{background:#dcfce7;color:#16a34a}
.status-badge.planificado{background:#f3f4f6;color:#4b5563}
.proj-progress{}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:11px;color:#4a8a6a;font-weight:500}
.prog-pct{font-size:12px;font-weight:700;color:#1d6b3e}
.prog-track{width:100%;height:8px;background:#e8f5ee;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#1d6b3e,#4ade80);border-radius:4px;transition:width .8s ease}
.proj-meta{display:flex;flex-direction:column;gap:5px}
.meta-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#4a8a6a}
.meta-row svg{width:12px;height:12px;flex-shrink:0;color:#4a8a6a;opacity:.8}
.proj-btn{margin-top:auto;padding:10px 16px;border-radius:8px;background:#f0faf5;border:1.5px solid #d4edd8;color:#1d6b3e;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;font-family:'Inter',sans-serif}
.proj-btn:hover{background:#1d6b3e;color:#fff;border-color:#1d6b3e}

/* ===== SKELETON ===== */
.skel-card{background:#fff;border-radius:16px;border:1.5px solid #d4edd8;overflow:hidden;pointer-events:none}
.skel-img{height:140px;background:linear-gradient(90deg,#e8f5ee 25%,#d4edd8 50%,#e8f5ee 75%);background-size:200% 100%;animation:skel-pulse 1.4s ease infinite}
.skel-body{padding:20px;display:flex;flex-direction:column;gap:12px}
.skel-line{height:12px;border-radius:6px;background:linear-gradient(90deg,#e8f5ee 25%,#d4edd8 50%,#e8f5ee 75%);background-size:200% 100%;animation:skel-pulse 1.4s ease infinite}
.skel-line.w80{width:80%}.skel-line.w60{width:60%}.skel-line.w40{width:40%}
@keyframes skel-pulse{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:72px 24px;color:#4a8a6a}
.empty-state .icon{font-size:56px;display:block;margin-bottom:16px}
.empty-state h3{font-family:'Poppins',sans-serif;font-size:18px;font-weight:700;color:#1a3d2b;margin-bottom:8px}
.empty-state p{font-size:14px}

/* ===== MODAL OVERLAY ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(10,30,20,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.modal-header{padding:28px 28px 0}
.modal-title-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.modal-emoji{font-size:36px;flex-shrink:0;line-height:1}
.modal-title-text{flex:1}
.modal-title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:#1a3d2b;line-height:1.2;margin-bottom:6px}
.modal-close{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:50%;border:1.5px solid #d4edd8;background:#f0faf5;color:#4a8a6a;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.modal-close:hover{background:#1d6b3e;color:#fff;border-color:#1d6b3e}
.modal-body{padding:20px 28px 28px}
.modal-prog-label{font-size:13px;font-weight:600;color:#1a3d2b;margin-bottom:8px;display:flex;justify-content:space-between}
.modal-prog-track{width:100%;height:12px;background:#e8f5ee;border-radius:6px;overflow:hidden;margin-bottom:20px}
.modal-prog-fill{height:100%;background:linear-gradient(90deg,#1d6b3e,#4ade80);border-radius:6px;transition:width .8s ease}
.modal-desc{font-size:14px;color:#4a8a6a;line-height:1.7;margin-bottom:24px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:480px){.modal-grid{grid-template-columns:1fr}}
.modal-field{background:#f0faf5;border-radius:10px;padding:12px 14px}
.modal-field-label{font-size:10px;font-weight:700;color:#4a8a6a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.modal-field-value{font-size:14px;font-weight:600;color:#1a3d2b}
.modal-section{margin-bottom:20px}
.modal-section-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:#1a3d2b;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.modal-section-title::after{content:'';flex:1;height:1px;background:#e8f5ee}
.hitos-list{display:flex;flex-direction:column;gap:8px}
.hito-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#4a8a6a;padding:8px 12px;border-radius:8px;background:#f0faf5}
.hito-num{width:22px;height:22px;background:#1d6b3e;color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gallery-placeholder{background:#f0faf5;border:2px dashed #a8dfc0;border-radius:12px;padding:28px;text-align:center;color:#4a8a6a;font-size:13px}
.gallery-placeholder .g-icon{font-size:32px;display:block;margin-bottom:8px}
.modal-footer{padding:16px 28px;border-top:1px solid #e8f5ee;display:flex;justify-content:flex-end}
.modal-close-btn{padding:10px 24px;border-radius:10px;background:#1d6b3e;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.modal-close-btn:hover{background:#155c32}

/* ===== TOAST ===== */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:#1a3d2b;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transform:translateY(12px);transition:.3s;pointer-events:auto;max-width:320px;border-left:3px solid #4ade80}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-left-color:#ef4444;background:#3b0a0a}

@media(max-width:640px){
  .navinner{padding:0 16px}
  .hero{padding:48px 16px 40px}
  .main{padding:24px 16px 60px}
  .stat-item{padding:14px 20px;min-width:110px}
  .stat-num{font-size:22px}
}

/* ── ANIMACIONES FASE 1 ── */
[data-reveal]{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease}
[data-reveal].revealed{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){[data-reveal]{opacity:1;transform:none;transition:none}}
.nav-scrolled{backdrop-filter:none;background:#fff!important;box-shadow:0 2px 20px rgba(29,107,62,.13)!important}
[data-stagger]>*{opacity:0;transform:translateY(20px);transition:opacity .4s ease,transform .4s ease}
[data-stagger]>*.stagger-in{opacity:1;transform:none}
.prog-fill{transition:width 1s cubic-bezier(.4,0,.2,1)!important}
.modal-prog-fill{transition:width 1.1s cubic-bezier(.4,0,.2,1)!important}
</style>

<script>
'use strict';

let allProyectos = [];
let currentFilter = 'all';

/* ── Emoji & status helpers ── */
const EMOJIS = ['🌳', '💧', '♻️', '🌿', '🌱', '🔬', '🌊', '📋'];
const STATUS_CLASS = {
  'En Ejecución': 'ejecucion',
  'Completado':   'completado',
  'Planificado':  'planificado'
};

function getEmoji(proyecto, idx) {
  const name = (proyecto.nombre || '').toLowerCase();
  if (name.includes('agua') || name.includes('río') || name.includes('quebrada') || name.includes('hídri')) return '💧';
  if (name.includes('recicl') || name.includes('residuo') || name.includes('composta')) return '♻️';
  if (name.includes('aire') || name.includes('calidad') || name.includes('monitoreo')) return '🌿';
  if (name.includes('educa') || name.includes('escuel')) return '🌱';
  return '🌳';
}

function getStatusClass(estado) {
  return STATUS_CLASS[estado] || 'planificado';
}

function getProgress(p) {
  const raw = p.porcentaje_avance ?? p.progreso ?? 0;
  const cleanRaw = String(raw).replace(/[^0-9]/g, '');
  return Math.min(100, Math.max(0, parseInt(cleanRaw) || 0));
}

/* ── Build stats ── */
function updateStats(data) {
  const total       = data.length;
  const ejecucion   = data.filter(p => p.estado === 'En Ejecución').length;
  const completado  = data.filter(p => p.estado === 'Completado').length;
  const planificado = data.filter(p => p.estado === 'Planificado').length;

  document.getElementById('statTotal').textContent      = total;
  document.getElementById('statEjecucion').textContent  = ejecucion;
  document.getElementById('statCompletado').textContent = completado;
  document.getElementById('statPlanificado').textContent= planificado;

  const an = window.IAGAMI_ANIM ? IAGAMI_ANIM.animateNumber : (el,v) => { el.textContent=v; };
  an(document.getElementById('cAll'),         total);
  an(document.getElementById('cEjecucion'),   ejecucion);
  an(document.getElementById('cCompletado'),  completado);
  an(document.getElementById('cPlanificado'), planificado);
}

/* ── Render cards ── */
function renderProyectos(data) {
  const grid = document.getElementById('projectsGrid');
  if (!data || data.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <span class="icon">🌱</span>
      <h3>Sin proyectos</h3>
      <p>No hay proyectos disponibles para este filtro.</p>
    </div>`;
    return;
  }

  grid.innerHTML = data.map((p, idx) => {
    const emoji    = getEmoji(p, idx);
    const sc       = getStatusClass(p.estado);
    const progress = getProgress(p);
    const label    = p.estado || 'Planificado';
    const resp     = p.responsable || '—';
    const inicio   = p.inicio || p.fecha_inicio || '—';
    const benef    = p.beneficiados || '—';

    return `<div class="proj-card" onclick="openDetail('${escHtml(String(p.id))}')">
      <div class="proj-image ${sc}">${emoji}</div>
      <div class="proj-body">
        <div class="proj-header">
          <div class="proj-name">${escHtml(p.nombre || 'Proyecto')}</div>
          <span class="status-badge ${sc}">${escHtml(label)}</span>
        </div>
        <div class="proj-progress">
          <div class="prog-header">
            <span class="prog-label">Avance</span>
            <span class="prog-pct">${progress}%</span>
          </div>
          <div class="prog-track"><div class="prog-fill" style="width:${progress}%"></div></div>
        </div>
        <div class="proj-meta">
          <div class="meta-row">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            ${escHtml(resp)}
          </div>
          <div class="meta-row">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            Inicio: ${escHtml(inicio)}
          </div>
          <div class="meta-row">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            ${escHtml(benef)}
          </div>
        </div>
        <div class="proj-btn" onclick="event.stopPropagation();openDetail('${escHtml(String(p.id))}')">Ver Detalles →</div>
      </div>
    </div>`;
  }).join('');
  if (window.IAGAMI_ANIM) {
    IAGAMI_ANIM.staggerChildren(grid);
    IAGAMI_ANIM.initProgressBars();
  }
}

/* ── Filter ── */
function filterByStatus(status) {
  currentFilter = status;
  document.querySelectorAll('.ftab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === status);
  });
  const filtered = status === 'all' ? allProyectos : allProyectos.filter(p => p.estado === status);
  const grid = document.getElementById('projectsGrid');
  if (window.IAGAMI_ANIM) {
    IAGAMI_ANIM.filterFade(grid, () => renderProyectos(filtered));
  } else {
    renderProyectos(filtered);
  }
}

/* ── Detail modal ── */
function openDetail(id) {
  const p = allProyectos.find(x => x.id == id);
  if (!p) { toast('Proyecto no encontrado', 'error'); return; }

  const emoji    = getEmoji(p);
  const sc       = getStatusClass(p.estado);
  const progress = getProgress(p);
  const label    = p.estado || 'Planificado';
  const resp     = p.responsable || '—';
  const inicio   = p.inicio || p.fecha_inicio || '—';
  const benef    = p.beneficiados || '—';
  const ubicacion= p.ubicacion || p.municipio || '—';
  const desc     = p.descripcion || 'Sin descripción disponible.';
  const hitosRaw = p.hitos || p.indicadores_clave || [];
  const hitos    = Array.isArray(hitosRaw) ? hitosRaw : (typeof hitosRaw === 'string' && hitosRaw.trim() ? hitosRaw.split('\n').map(s => s.trim()).filter(Boolean) : []);

  document.getElementById('modalHeader').innerHTML = `
    <div class="modal-title-row">
      <span class="modal-emoji">${emoji}</span>
      <div class="modal-title-text">
        <div class="modal-title">${escHtml(p.nombre || 'Proyecto')}</div>
        <span class="status-badge ${sc}">${escHtml(label)}</span>
      </div>
    </div>`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-prog-label">
      <span>Avance del proyecto</span>
      <span style="color:#1d6b3e;font-weight:700">${progress}%</span>
    </div>
    <div class="modal-prog-track">
      <div class="modal-prog-fill" style="width:${progress}%"></div>
    </div>

    <p class="modal-desc">${escHtml(desc)}</p>

    <div class="modal-grid">
      <div class="modal-field">
        <div class="modal-field-label">Responsable</div>
        <div class="modal-field-value">${escHtml(resp)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Fecha de Inicio</div>
        <div class="modal-field-value">${escHtml(inicio)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Beneficiados</div>
        <div class="modal-field-value">${escHtml(benef)}</div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Municipio / Sector</div>
        <div class="modal-field-value">${escHtml(ubicacion)}</div>
      </div>
    </div>

    ${hitos.length ? `
    <div class="modal-section">
      <div class="modal-section-title">Hitos del Proyecto</div>
      <div class="hitos-list">
        ${hitos.map((h, i) => `<div class="hito-item"><div class="hito-num">${i+1}</div><span>${escHtml(h)}</span></div>`).join('')}
      </div>
    </div>` : ''}

    <div class="modal-section">
      <div class="modal-section-title">Galería de Evidencias</div>
      <div class="gallery-placeholder">
        <span class="g-icon">📸</span>
        Evidencias fotográficas disponibles en sede IAGAMI
      </div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

/* ── Toast ── */
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 400);
  }, 3500);
}

/* ── Escape HTML ── */
function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Skeleton loader ── */
function showSkeleton() {
  const grid = document.getElementById('projectsGrid');
  const card = () => `<div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>`;
  grid.innerHTML = card() + card() + card();
}

/* ── Init ── */
async function init() {
  showSkeleton();
  try {
    allProyectos = (await CMSDB.getAll('proyectos')) || [];
    if (!Array.isArray(allProyectos)) allProyectos = [];
  } catch(e) {
    console.error('Error loading proyectos:', e);
    allProyectos = [];
    toast('Error al cargar proyectos', 'error');
  }

  updateStats(allProyectos);
  renderProyectos(allProyectos);
  requestAnimationFrame(() => {
    if (window.IAGAMI_ANIM) window.IAGAMI_ANIM.initProgressBars();
  });
}

document.addEventListener('DOMContentLoaded', init);

/* Keyboard close */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
