<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Directorio Empresarial — IAGAMI</title>
<meta name="description" content="Directorio de empresas con registro ambiental en el Municipio Iribarren. Consulta permisos, categorías y estado de cumplimiento ambiental empresarial."/>
<meta name="theme-color" content="#1d6b3e"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#f0faf5;color:#1a3d2b;line-height:1.6}

/* ===== NAV ===== */
.nav{background:#fff;border-bottom:1px solid #c8ead8;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(29,107,62,.06)}
.navinner{max-width:1200px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none}
.logo-icon{width:38px;height:38px;background:#1d6b3e;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;color:#1a3d2b;line-height:1.1}
.logo-sub{font-size:10px;color:#4a8a6a;font-weight:400;display:block}
.back-link{display:flex;align-items:center;gap:6px;font-size:13px;color:#1d6b3e;text-decoration:none;font-weight:500;padding:6px 14px;border-radius:8px;border:1.5px solid #a8dfc0;transition:.15s;white-space:nowrap}
.back-link:hover{background:#e8f5ee}

/* ===== HERO ===== */
.hero{background:linear-gradient(135deg,#1a3d2b 0%,#1d6b3e 50%,#22854d 100%);padding:64px 24px 56px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-content{position:relative;z-index:1;max-width:700px;margin:0 auto}
.hero-emoji{font-size:52px;display:block;margin-bottom:16px}
.hero h1{font-family:'Poppins',sans-serif;font-size:clamp(26px,5vw,40px);font-weight:800;color:#fff;margin-bottom:12px}
.hero p{font-size:16px;color:rgba(255,255,255,.8);max-width:560px;margin:0 auto}

/* ===== STATS BAR ===== */
.stats-bar{background:#fff;border-bottom:1.5px solid #d4edd8;padding:0 24px}
.stats-inner{max-width:1200px;margin:0 auto;display:flex;gap:0;overflow-x:auto}
.stat-item{padding:18px 32px;display:flex;flex-direction:column;align-items:center;border-right:1px solid #e8f5ee;min-width:150px;flex:1}
.stat-item:last-child{border-right:none}
.stat-num{font-family:'Poppins',sans-serif;font-size:28px;font-weight:800;color:#1d6b3e;line-height:1}
.stat-label{font-size:11px;color:#4a8a6a;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* ===== MAIN ===== */
.main{max-width:1200px;margin:0 auto;padding:36px 24px 80px}

/* ===== CONTROLS ===== */
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-input{width:100%;padding:10px 16px 10px 40px;border:1.5px solid #d4edd8;border-radius:10px;background:#fff;font-size:14px;color:#1a3d2b;font-family:'Inter',sans-serif;outline:none;transition:.15s}
.search-input:focus{border-color:#1d6b3e;box-shadow:0 0 0 3px rgba(29,107,62,.08)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#4a8a6a;pointer-events:none}
.filter-select{padding:10px 14px;border:1.5px solid #d4edd8;border-radius:10px;background:#fff;color:#1a3d2b;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;outline:none;transition:.15s;min-width:160px}
.filter-select:focus{border-color:#1d6b3e}
.results-count{font-size:13px;color:#4a8a6a;font-weight:500;padding:6px 0;white-space:nowrap}

/* ===== COMPANIES GRID ===== */
.companies-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1024px){.companies-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.companies-grid{grid-template-columns:1fr}}

/* ===== COMPANY CARD ===== */
.company-card{background:#fff;border-radius:16px;border:1.5px solid #d4edd8;padding:20px;transition:.2s;cursor:pointer;display:flex;flex-direction:column;gap:12px}
.company-card:hover{border-color:#1d6b3e;box-shadow:0 6px 24px rgba(29,107,62,.1);transform:translateY(-2px)}
.card-header{display:flex;flex-direction:column;gap:8px}
.company-name{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;color:#1a3d2b;line-height:1.3}
.card-badges{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.rif-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#f0faf5;color:#1d6b3e;border:1px solid #d4edd8;letter-spacing:.04em}
.cat-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.cat-badge.industrial{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.cat-badge.construcción{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.cat-badge.comercial{background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
.cat-badge.servicios{background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4}
.cat-badge.agrícola{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.cat-badge.otro{background:#f3f4f6;color:#4b5563;border:1px solid #e5e7eb}
.permit-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.permit-badge.vigente{background:#dcfce7;color:#16a34a}
.permit-badge.en-proceso{background:#dbeafe;color:#1d4ed8}
.permit-badge.vencido{background:#fee2e2;color:#dc2626}
.permit-badge.suspendido{background:#fef3c7;color:#b45309}
.card-meta{display:flex;flex-direction:column;gap:4px}
.card-meta-row{font-size:12px;color:#4a8a6a;display:flex;align-items:center;gap:6px}
.card-meta-row svg{width:12px;height:12px;flex-shrink:0;opacity:.7}
.card-btn{margin-top:auto;padding:9px 16px;border-radius:8px;background:#f0faf5;border:1.5px solid #d4edd8;color:#1d6b3e;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;font-family:'Inter',sans-serif}
.card-btn:hover{background:#1d6b3e;color:#fff;border-color:#1d6b3e}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:72px 24px;color:#4a8a6a;grid-column:1/-1}
.empty-state .icon{font-size:56px;display:block;margin-bottom:16px}
.empty-state h3{font-family:'Poppins',sans-serif;font-size:18px;font-weight:700;color:#1a3d2b;margin-bottom:8px}
.empty-state p{font-size:14px;margin-bottom:16px}
.empty-state button{padding:10px 24px;border-radius:10px;background:#1d6b3e;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.empty-state button:hover{background:#155c32}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(10,30,20,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.modal-close{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:50%;border:1.5px solid #d4edd8;background:#f0faf5;color:#4a8a6a;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1;z-index:1}
.modal-close:hover{background:#1d6b3e;color:#fff;border-color:#1d6b3e}
.modal-content{padding:28px}
.modal-company-name{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:#1a3d2b;margin-bottom:6px;line-height:1.2;padding-right:40px}
.modal-rif{font-size:13px;color:#4a8a6a;font-weight:600;margin-bottom:14px;letter-spacing:.04em}
.modal-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.modal-divider{height:1px;background:#e8f5ee;margin:20px 0}
.modal-section-title{font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#4a8a6a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.modal-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.modal-field{display:flex;gap:10px;align-items:flex-start}
.modal-field-icon{width:18px;flex-shrink:0;margin-top:2px;color:#4a8a6a}
.modal-field-text{}
.modal-field-label{font-size:10px;font-weight:700;color:#4a8a6a;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px}
.modal-field-value{font-size:13px;color:#1a3d2b;font-weight:500}
.obs-box{background:#f0faf5;border-radius:10px;padding:14px 16px;font-size:13px;color:#4a8a6a;line-height:1.7;margin-bottom:20px}
.contact-note{background:#e8f5ee;border-radius:10px;padding:12px 16px;font-size:12px;color:#4a8a6a;display:flex;align-items:center;gap:8px}
.contact-note strong{color:#1d6b3e}
.modal-footer{padding:16px 28px;border-top:1px solid #e8f5ee;display:flex;justify-content:flex-end}
.modal-close-btn{padding:10px 24px;border-radius:10px;background:#1d6b3e;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.modal-close-btn:hover{background:#155c32}

/* ===== TOAST ===== */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:#1a3d2b;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transform:translateY(12px);transition:.3s;pointer-events:auto;max-width:320px;border-left:3px solid #4ade80}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-left-color:#ef4444;background:#3b0a0a}

@media(max-width:640px){
  .navinner{padding:0 16px}
  .hero{padding:48px 16px 40px}
  .main{padding:24px 16px 60px}
  .stat-item{padding:14px 16px;min-width:120px}
  .stat-num{font-size:22px}
  .controls{flex-direction:column;align-items:stretch}
  .search-wrap{min-width:unset}
  .filter-select{width:100%}
  .modal-content{padding:20px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="navinner">
    <a href="../index.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="white" opacity=".9"/>
          <path d="M9 12l2 2 4-4" stroke="#1d6b3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">IAGAMI</div>
        <span class="logo-sub">Municipio Iribarren</span>
      </div>
    </a>
    <a href="../index.html" class="back-link">← Portal</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <span class="hero-emoji">🏭</span>
    <h1>Directorio Empresarial</h1>
    <p>Empresas con registro ambiental en el Municipio Iribarren</p>
  </div>
</section>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-item"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Registradas</div></div>
    <div class="stat-item"><div class="stat-num" id="statVigente">—</div><div class="stat-label">Vigentes</div></div>
    <div class="stat-item"><div class="stat-num" id="statProceso">—</div><div class="stat-label">En Proceso</div></div>
    <div class="stat-item"><div class="stat-num" id="statVencido">—</div><div class="stat-label">Vencidas</div></div>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" class="search-input" id="searchInput" placeholder="Buscar empresa por nombre o RIF…" oninput="applyFilters()"/>
    </div>
    <select class="filter-select" id="catFilter" onchange="applyFilters()">
      <option value="">Todas las categorías</option>
      <option value="Industrial">Industrial</option>
      <option value="Construcción">Construcción</option>
      <option value="Comercial">Comercial</option>
      <option value="Servicios">Servicios</option>
      <option value="Agrícola">Agrícola</option>
    </select>
    <select class="filter-select" id="permisoFilter" onchange="applyFilters()">
      <option value="">Todos los permisos</option>
      <option value="Vigente">Vigente</option>
      <option value="En Proceso">En Proceso</option>
      <option value="Vencido">Vencido</option>
      <option value="Suspendido">Suspendido</option>
    </select>
    <div class="results-count" id="resultsCount"></div>
  </div>

  <!-- Companies Grid -->
  <div class="companies-grid" id="companiesGrid"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">×</button>
    <div class="modal-content" id="modalContent"></div>
    <div class="modal-footer">
      <button class="modal-close-btn" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="../cms/config.js"></script>
<script src="../cms/pb.js"></script>
<script>
'use strict';

let allEmpresas = [];
let filtered    = [];

const normalize = str => (str || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

/* ── Badge class maps — declarados una sola vez en memoria ── */
const CAT_CLASS_MAP = {
  'Industrial':   'industrial',
  'Construcción': 'construcción',
  'Comercial':    'comercial',
  'Servicios':    'servicios',
  'Agrícola':     'agrícola'
};
const PERMISO_CLASS_MAP = {
  'Vigente':    'vigente',
  'En Proceso': 'en-proceso',
  'Vencido':    'vencido',
  'Suspendido': 'suspendido'
};

function getCatClass(cat)     { return CAT_CLASS_MAP[cat]    || 'otro'; }
function getPermisoClass(est) { return PERMISO_CLASS_MAP[est] || 'en-proceso'; }

/* ── Permit CSS class ── */

/* ── Stats ── */
function updateStats(data) {
  document.getElementById('statTotal').textContent   = data.length;
  document.getElementById('statVigente').textContent = data.filter(e => e.estado_permiso === 'Vigente').length;
  document.getElementById('statProceso').textContent = data.filter(e => e.estado_permiso === 'En Proceso').length;
  document.getElementById('statVencido').textContent = data.filter(e => e.estado_permiso === 'Vencido' || e.estado_permiso === 'Suspendido').length;
}

/* ── Render cards ── */
function renderEmpresas(data) {
  const grid = document.getElementById('companiesGrid');

  if (!data || data.length === 0) {
    document.getElementById('resultsCount').textContent = '0 empresas encontradas';
    grid.innerHTML = `<div class="empty-state">
      <span class="icon">🔍</span>
      <h3>Sin resultados</h3>
      <p>No se encontraron empresas con los filtros seleccionados.</p>
      <button onclick="clearFilters()">Limpiar filtros</button>
    </div>`;
    return;
  }

  document.getElementById('resultsCount').textContent = `${data.length} empresa${data.length !== 1 ? 's' : ''} encontrada${data.length !== 1 ? 's' : ''}`;
  const catClass    = getCatClass;
  const permisoClass= getPermisoClass;

  grid.innerHTML = data.map(e => {
    const cat       = e.categoria || '—';
    const permiso   = e.estado_permiso || '—';
    const registro  = e.fecha_registro || e.fecha_vencimiento || '—';
    const nombre    = e.nombre || 'Empresa';
    const rif       = e.rif || '—';
    const actividad = e.actividad || e.descripcion || '';

    return `<div class="company-card" data-id="${escHtml(String(e.id))}">
      <div class="card-header">
        <div class="company-name">${escHtml(nombre)}</div>
        <div class="card-badges">
          <span class="rif-badge">${escHtml(rif)}</span>
          <span class="cat-badge ${catClass(cat)}">${escHtml(cat)}</span>
          <span class="permit-badge ${permisoClass(permiso)}">${escHtml(permiso)}</span>
        </div>
      </div>
      ${actividad ? `<div class="card-meta">
        <div class="card-meta-row">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6H4V4h16v2zm-2 4H6v2h12v-2zm2 6H4v2h16v-2z"/></svg>
          ${escHtml(actividad)}
        </div>
      </div>` : ''}
      <div class="card-meta">
        <div class="card-meta-row">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
          Registro: ${escHtml(registro)}
        </div>
      </div>
      <div class="card-btn">Ver Detalles →</div>
    </div>`;
  }).join('');
}

/* ── Apply filters ── */
function applyFilters() {
  const q       = document.getElementById('searchInput').value.trim();
  const nq      = normalize(q);
  const cat     = document.getElementById('catFilter').value;
  const permiso = document.getElementById('permisoFilter').value;

  filtered = allEmpresas.filter(e => {
    const matchQ = !q || normalize(e.nombre).includes(nq) || normalize(e.rif).includes(nq) || normalize(e.actividad || e.descripcion).includes(nq);
    const matchC = !cat || e.categoria === cat;
    const matchP = !permiso || e.estado_permiso === permiso;
    return matchQ && matchC && matchP;
  });

  renderEmpresas(filtered);
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('catFilter').value   = '';
  document.getElementById('permisoFilter').value = '';
  applyFilters();
}

/* ── Detail modal ── */
function openDetail(id) {
  const e = allEmpresas.find(x => x.id == id);
  if (!e) { toast('Empresa no encontrada', 'error'); return; }

  const cat       = e.categoria || '—';
  const permiso   = e.estado_permiso || '—';
  const nombre    = e.nombre || 'Empresa';
  const rif       = e.rif || '—';
  const dir       = e.direccion || e.address || '—';
  const tel       = e.telefono || e.phone || '—';
  const email     = e.email || '—';
  const resp      = e.responsable || e.responsable_ambiental || '—';
  const obs       = e.observaciones || e.descripcion || 'Sin observaciones registradas.';
  const actividad = e.actividad || '';
  const registro  = e.fecha_registro || '—';
  const vence     = e.fecha_vencimiento || null;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-company-name">${escHtml(nombre)}</div>
    <div class="modal-rif">RIF: ${escHtml(rif)}</div>
    <div class="modal-badges">
      <span class="cat-badge ${getCatClass(cat)}">${escHtml(cat)}</span>
      <span class="permit-badge ${getPermisoClass(permiso)}">${escHtml(permiso)}</span>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-section-title">Información de Contacto</div>
    <div class="modal-fields">
      ${actividad ? `<div class="modal-field">
        <svg class="modal-field-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <div class="modal-field-text"><span class="modal-field-label">Actividad</span><span class="modal-field-value">${escHtml(actividad)}</span></div>
      </div>` : ''}
      <div class="modal-field">

      <div class="modal-field">
        <svg class="modal-field-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>

        <div class="modal-field-text"><span class="modal-field-label">Correo Electrónico</span><span class="modal-field-value">${escHtml(email)}</span></div>

    <div class="obs-box">${escHtml(obs)}</div>
    <div class="contact-note">
      📧 Para consultas sobre este registro: <strong>empresas@iagami.gob.ve</strong>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

/* ── Toast ── */
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 400);
  }, 3500);
}

/* ── Escape HTML ── */
function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Init ── */
async function init() {
  try {
    allEmpresas = await CMSDB.getAll('empresas') || [];
  } catch(e) {
    console.error('Error loading empresas:', e);
    allEmpresas = [];
    toast('Error al cargar el directorio', 'error');
  }

  filtered = [...allEmpresas];
  updateStats(allEmpresas);
  renderEmpresas(filtered);
}

document.addEventListener('DOMContentLoaded', () => {
  init();
  /* Event delegation — evita inyectar IDs en atributos onclick */
  document.getElementById('companiesGrid').addEventListener('click', ev => {
    const card = ev.target.closest('.company-card[data-id]');
    if (card) openDetail(card.dataset.id);
  });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
