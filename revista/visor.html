<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="pb-url" content="https://authorities-actors-continues-adequate.trycloudflare.com"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visor — Revista Digital IAGAMI</title>
<meta name="theme-color" content="#1d6b3e"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#111814;color:#1a3d2b;line-height:1.6;min-height:100vh}

/* ══ TOP NAV ══ */
.viewer-nav{
  background:rgba(13,29,26,.97);backdrop-filter:blur(12px);
  color:#fff;padding:0 20px;height:56px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:300;border-bottom:1px solid rgba(255,255,255,.07);
  box-shadow:0 4px 24px rgba(0,0,0,.5);
}
.nav-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-logo-ico{width:34px;height:34px;background:#1d6b3e;border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-logo-ico svg{width:18px;height:18px}
.nav-brand{font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.nav-brand small{font-size:10px;font-weight:400;opacity:.6;display:block}
.nav-sep{width:1px;height:28px;background:rgba(255,255,255,.15);flex-shrink:0}
.nav-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-right{display:flex;gap:6px;flex-shrink:0;align-items:center}
.nav-btn{
  display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;transition:.2s;border:none;
  font-family:'Inter',sans-serif;white-space:nowrap;
}
.btn-back{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.12)}
.btn-back:hover{background:rgba(255,255,255,.15)}
.btn-toc{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.12)}
.btn-toc:hover{background:rgba(255,255,255,.15)}
.btn-print{background:#1d6b3e;color:#fff}
.btn-print:hover{background:#155c32}
.btn-dl{background:#4ade80;color:#0d2d1a;font-weight:700}
.btn-dl:hover{background:#22c55e}

/* ══ HERO PORTADA BANNER ══ */
.portada-hero{
  min-height:440px;display:flex;align-items:flex-end;justify-content:flex-start;
  position:relative;overflow:hidden;
  background:linear-gradient(155deg,#1d6b3e,#0d2d1a);
}
.portada-hero .ph-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.28}
.portada-hero .ph-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.3) 50%,transparent 100%);
}
.portada-hero .ph-content{
  position:relative;z-index:2;
  padding:40px 60px;max-width:860px;margin:0 auto;width:100%;
}
.ph-sup{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.ph-titulo{font-family:'Poppins',sans-serif;font-size:42px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:10px}
.ph-sub{font-size:15px;color:rgba(255,255,255,.75);max-width:560px;line-height:1.6;margin-bottom:20px}
.ph-meta{display:flex;gap:20px;flex-wrap:wrap}
.ph-meta span{font-size:12px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:5px}
.ph-line{width:56px;height:3px;background:#4ade80;border-radius:2px;margin-bottom:20px}

/* ══ LAYOUT SHELL ══ */
.shell{display:flex;max-width:1140px;margin:0 auto;padding:32px 20px 80px;gap:32px;align-items:flex-start}

/* ══ TABLE OF CONTENTS ══ */
#toc-panel{
  width:220px;flex-shrink:0;position:sticky;top:72px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:16px;max-height:calc(100vh - 100px);overflow-y:auto;
  transition:transform .3s ease;
}
#toc-panel.hidden{display:none}
.toc-title{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.toc-item{
  display:block;padding:6px 8px;border-radius:6px;
  font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;
  transition:.15s;border-left:2px solid transparent;text-decoration:none;
  line-height:1.35;margin-bottom:2px;
}
.toc-item:hover,.toc-item.active{color:#4ade80;border-left-color:#4ade80;background:rgba(74,222,128,.08)}
#toc-panel::-webkit-scrollbar{width:4px}
#toc-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

/* ══ MAGAZINE CANVAS ══ */
.magazine-canvas{flex:1;display:flex;flex-direction:column;gap:0;min-width:0}

/* ══ BLOCK STYLES ══ */

/* portada-embedded */
.blk-portada{min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;border-radius:12px 12px 0 0;padding:56px 40px}
.blk-portada .portada-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.35}
.portada-inner{position:relative;z-index:1}
.portada-logo{font-size:44px;margin-bottom:14px}
.portada-sup{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.portada-titulo{font-family:'Poppins',sans-serif;font-size:34px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:8px}
.portada-sub{font-size:14px;color:rgba(255,255,255,.78);line-height:1.6}
.portada-line{width:56px;height:3px;background:#4ade80;border-radius:2px;margin:18px auto}

/* encabezado */
.blk-encabezado{background:#fff;padding:44px 56px 30px;border-left:5px solid #1d6b3e}
.enc-titulo{font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;color:#1a3d2b;line-height:1.2;margin-bottom:6px}
.enc-sub{font-size:13.5px;color:#4a8a6a;font-weight:500}

/* texto */
.blk-texto{background:#fff;padding:32px 56px}
.blk-texto p{font-size:14.5px;color:#2d4a3e;line-height:1.9;margin-bottom:12px;orphans:3;widows:3}

/* articulo */
.blk-articulo{background:#fff;padding:36px 56px;display:grid;grid-template-columns:1fr;gap:20px}
.blk-articulo.has-img{grid-template-columns:1fr 300px}
.art-title{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:#1a3d2b;margin-bottom:5px;line-height:1.25}
.art-author{font-size:11.5px;font-weight:700;color:#4a8a6a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.art-content{font-size:14px;color:#2d4a3e;line-height:1.85}
.art-img{border-radius:10px;overflow:hidden}
.art-img img{width:100%;height:220px;object-fit:cover;display:block}

/* cita */
.blk-cita{background:#e8f5ee;border-left:6px solid #1d6b3e;padding:36px 56px;position:relative}
.blk-cita::before{content:'"';position:absolute;top:14px;left:40px;font-family:'Poppins',sans-serif;font-size:80px;color:#a8dfc0;line-height:1;font-weight:800}
.cita-text{font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;color:#1a3d2b;line-height:1.5;position:relative;padding-top:36px;font-style:italic}
.cita-author{font-size:11.5px;font-weight:700;color:#4a8a6a;margin-top:12px;text-transform:uppercase;letter-spacing:.06em}

/* imagen */
.blk-imagen{background:#fff;padding:24px 56px}
.blk-imagen.half .img-wrap{max-width:50%;margin:0 auto}
.blk-imagen.third .img-wrap{max-width:33%;margin:0 auto}
.img-wrap img{width:100%;border-radius:10px;display:block}
.img-placeholder{padding:40px;text-align:center;background:#f0faf5;border-radius:10px;color:#4a8a6a;font-size:13px;border:2px dashed #d4edd8}
.img-pie{font-size:12px;color:#4a8a6a;text-align:center;margin-top:8px;font-style:italic}

/* galeria */
.blk-galeria{background:#fff;padding:24px 56px}
.galeria-grid{display:grid;gap:10px}
.galeria-grid.cols-2{grid-template-columns:1fr 1fr}
.galeria-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.galeria-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.galeria-grid img{width:100%;height:180px;object-fit:cover;border-radius:8px;display:block;transition:.2s}
.galeria-grid img:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(0,0,0,.15)}

/* kpi */
.blk-kpi-wrap{background:#f8fcfa;padding:16px 56px}
.kpi-card{background:#fff;border-radius:12px;padding:28px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #e8f5ee}
.kpi-ico{font-size:40px;margin-bottom:10px}
.kpi-num{font-size:38px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-label{font-size:13px;color:#4a8a6a;margin-top:2px}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:700;margin-top:8px;padding:3px 10px;border-radius:20px}
.t-up{background:#dcfce7;color:#166534}
.t-down{background:#fee2e2;color:#991b1b}
.t-flat{background:#f1f5f9;color:#475569}

/* infografia */
.blk-infografia{background:#fff;padding:28px 56px}
.inf-title{font-family:'Poppins',sans-serif;font-size:17px;font-weight:700;color:#1a3d2b;margin-bottom:20px}
.inf-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.inf-row-label{width:130px;font-size:13px;font-weight:500;color:#1a3d2b;flex-shrink:0}
.inf-track{flex:1;background:#f0faf5;border-radius:20px;height:20px;overflow:hidden}
.inf-fill{height:100%;border-radius:20px;transition:width .6s ease}
.inf-val{width:40px;font-size:13px;font-weight:700;color:#1a3d2b;text-align:right;flex-shrink:0}

/* separador */
.blk-separador{background:#fff;padding:8px 56px}
.sep-linea{height:2px;background:linear-gradient(90deg,transparent,#a8dfc0,transparent)}
.sep-espacio{height:36px}
.sep-decorativo{display:flex;align-items:center;gap:18px;padding:20px 0}
.sep-decorativo::before,.sep-decorativo::after{content:'';flex:1;height:1px;background:#d4edd8}
.sep-decorativo span{color:#a8dfc0;font-size:20px}

/* noticias */
.blk-noticias{background:#f8fcfa;padding:40px 56px;border-top:3px solid #1d6b3e}
.noticias-titulo{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:#1a3d2b;margin-bottom:20px}
.noticias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.noticia-card{background:#fff;border:1px solid #d4edd8;border-radius:10px;overflow:hidden;transition:.2s;cursor:default}
.noticia-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.noticia-cat{font-size:10px;font-weight:700;color:#1d6b3e;text-transform:uppercase;padding:12px 14px 4px;letter-spacing:.05em}
.noticia-titulo{font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#1a3d2b;padding:0 14px 10px;line-height:1.35}
.noticia-fecha{font-size:11px;color:#4a8a6a;padding:0 14px 12px}

/* ══ LOADING / ERROR STATES ══ */
.state-center{display:flex;align-items:center;justify-content:center;min-height:60vh;text-align:center;color:rgba(255,255,255,.7);padding:40px}
.state-inner{max-width:400px}
.state-ico{font-size:56px;margin-bottom:16px}
.state-title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.state-msg{font-size:14px;color:rgba(255,255,255,.6);line-height:1.7}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.12);border-top-color:#4ade80;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ SCROLL PROGRESS ══ */
#scroll-progress{
  position:fixed;top:56px;left:0;right:0;height:3px;z-index:299;
  background:linear-gradient(90deg,#4ade80,#1d6b3e);
  transform-origin:left;transform:scaleX(0);transition:transform 0.2s cubic-bezier(0.22,1,0.36,1);
}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a3d2b;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ PRINT ══ */
@media print {
  .viewer-nav,#scroll-progress,#toc-panel,.nav-right{display:none!important}
  body{background:#fff!important;color:#000}
  .shell{display:block;padding:0;max-width:100%}
  .magazine-canvas{display:block}
  .portada-hero{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .blk-encabezado,.blk-texto,.blk-articulo,.blk-cita{-webkit-print-color-adjust:exact;print-color-adjust:exact;page-break-inside:avoid}
}

/* ══ RESPONSIVE ══ */
@media(max-width:900px){
  #toc-panel{display:none!important}
  .shell{padding:20px 12px 60px}
}
@media(max-width:700px){
  .ph-titulo{font-size:28px}
  .ph-content{padding:28px 20px}
  .blk-encabezado,.blk-texto,.blk-articulo,.blk-cita,.blk-imagen,.blk-galeria,.blk-separador,.blk-noticias,.blk-infografia,.blk-kpi-wrap{padding-left:24px;padding-right:24px}
  .blk-articulo.has-img{grid-template-columns:1fr}
  .galeria-grid.cols-3,.galeria-grid.cols-4{grid-template-columns:1fr 1fr}
  .nav-brand,.nav-sep,.nav-title{display:none}
  .btn-toc{display:none}
}

/* ══ BLOCK ANIMATION ══ */
.blk-animate{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.blk-animate.visible{opacity:1;transform:translateY(0)}
</style>
</head>

<script>
'use strict';

let _revId   = null;
let _revista = null;
let _tocOpen = true;

/* ── TOAST ── */
let _toastT;
function toast(msg) {
  const t = document.getElementById('app-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.remove('show'), 3200);
}

/* ── SCROLL PROGRESS ── */
window.addEventListener('scroll', () => {
  const bar = document.getElementById('scroll-progress');
  if (!bar) return;
  const scrolled = window.scrollY;
  const total = document.documentElement.scrollHeight - window.innerHeight;
  bar.style.transform = `scaleX(${total > 0 ? scrolled / total : 0})`;

  // Update active TOC item
  const sections = document.querySelectorAll('.enc-anchor');
  let active = null;
  sections.forEach(s => {
    if (s.getBoundingClientRect().top < 120) active = s.dataset.id;
  });
  if (active) {
    document.querySelectorAll('.toc-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === active);
    });
  }
});

/* ── ESCAPE ── */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── SANITIZACIÓN DE ESTILOS/URLS ──
   Los bloques de la revista vienen del CMS (editor); sus colores y URLs
   de imagen se insertan directamente en atributos `style`/`src`. Sin
   lista blanca, un valor como `red;background:url(javascript:...)` o
   `expression(...)` permitiría inyectar CSS/markup arbitrario. Solo se
   aceptan colores hex (#rgb/#rrggbb) y URLs http(s); cualquier otra
   cosa cae al valor por defecto. */
function safeColor(c) {
  const v = String(c || '').trim();
  return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(v) ? v : '#1d6b3e';
}
function safeImageUrl(u) {
  const v = String(u || '').trim();
  return /^https:\/\/[a-zA-Z0-9._~:/?#[\]@!$&'()*+,;=%-]+$/.test(v) ? v : '';
}

/* ── COLOR UTIL ── */
function shadeColor(hex, pct) {
  try {
    const n = parseInt((hex||'#1d6b3e').replace('#',''), 16);
    const r = Math.max(0, Math.min(255, ((n>>16)&0xff) + pct));
    const g = Math.max(0, Math.min(255, ((n>>8)&0xff) + pct));
    const b = Math.max(0, Math.min(255, (n&0xff) + pct));
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  } catch(e) { return hex||'#1d6b3e'; }
}

/* ── TOC ── */
function toggleTOC() {
  _tocOpen = !_tocOpen;
  const panel = document.getElementById('toc-panel');
  if (panel) panel.classList.toggle('hidden', !_tocOpen);
}

function scrollToSection(id) {
  const el = document.getElementById('sec-' + id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'start' }); }
}

/* ── BLOCK RENDERERS ── */
const RENDERERS = {

  portada(b) {
    const bg = safeColor(b.color_fondo);
    const safeImg = safeImageUrl(b.imagen_url);
    const imgTag = safeImg ? `<img class="portada-img" src="${escHtml(safeImg)}" alt="Portada" loading="eager"/>` : '';
    return `<div class="blk-portada blk-animate" style="background:linear-gradient(155deg,${bg},${shadeColor(bg,-50)})">
      ${imgTag}
      <div class="portada-inner">
        <div class="portada-logo">🌿</div>
        <div class="portada-sup">IAGAMI · Revista Digital</div>
        <div class="portada-titulo">${escHtml(b.titulo||'Revista IAGAMI')}</div>
        ${b.subtitulo ? `<div class="portada-sub">${escHtml(b.subtitulo)}</div>` : ''}
        <div class="portada-line"></div>
      </div>
    </div>`;
  },

  encabezado(b, idx) {
    const anId = 'enc-' + idx;
    return `<div class="blk-encabezado blk-animate" style="${b.bg_color?'background:'+b.bg_color:''}">
      <span class="enc-anchor" id="sec-${anId}" data-id="${anId}" style="display:block;margin-top:-72px;padding-top:72px;pointer-events:none"></span>
      <div class="enc-titulo" style="${b.text_color?'color:'+b.text_color:''}">${escHtml(b.titulo||'')}</div>
      ${b.subtitulo ? `<div class="enc-sub">${escHtml(b.subtitulo)}</div>` : ''}
    </div>`;
  },

  texto(b) {
    const paras = (b.contenido||'').split(/\n+/).filter(p => p.trim());
    const style = [
      b.text_color ? 'color:'+safeColor(b.text_color) : '',
      ['left','center','right','justify'].includes(b.text_align) ? 'text-align:'+b.text_align : ''
    ].filter(Boolean).join(';');
    return `<div class="blk-texto blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color):''}">
      ${paras.map(p => `<p style="${style}">${escHtml(p)}</p>`).join('')}
    </div>`;
  },

  articulo(b) {
    const safeArtImg = safeImageUrl(b.imagen_url);
    const hasImg = !!safeArtImg;
    const imgHtml = hasImg ? `<div class="art-img"><img src="${escHtml(safeArtImg)}" alt="${escHtml(b.titulo)}" loading="lazy"/></div>` : '';
    const paras = (b.contenido||'').split(/\n+/).filter(p => p.trim());
    const style = ['left','center','right','justify'].includes(b.text_align) ? 'text-align:'+b.text_align : '';
    return `<div class="blk-articulo${hasImg?' has-img':''} blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color):''}">
      <div class="art-body">
        <div class="art-title" style="${b.text_color?'color:'+safeColor(b.text_color):''}">${escHtml(b.titulo||'')}</div>
        ${b.autor ? `<div class="art-author">Por: ${escHtml(b.autor)}</div>` : ''}
        <div class="art-content" style="${style}">${paras.map(p => `<p style="margin-bottom:10px">${escHtml(p)}</p>`).join('')}</div>
      </div>
      ${imgHtml}
    </div>`;
  },

  cita(b) {
    const style = b.text_color ? 'color:'+safeColor(b.text_color) : '';
    return `<div class="blk-cita blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color)+';border-left-color:'+safeColor(b.bg_color):''}">
      <div class="cita-text" style="${style}">${escHtml(b.texto||'')}</div>
      ${b.autor ? `<div class="cita-author">${escHtml(b.autor)}</div>` : ''}
    </div>`;
  },

  imagen(b) {
    const safeImgBlock = safeImageUrl(b.imagen_url);
    if (!safeImgBlock) return `<div class="blk-imagen blk-animate"><div class="img-placeholder">🖼️ Imagen no configurada</div></div>`;
    const cls = b.ancho === 'half' ? 'half' : b.ancho === 'third' ? 'third' : '';
    return `<div class="blk-imagen ${cls} blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color):''}">
      <div class="img-wrap"><img src="${escHtml(safeImgBlock)}" alt="${escHtml(b.pie||'Imagen')}" loading="lazy"/></div>
      ${b.pie ? `<div class="img-pie">${escHtml(b.pie)}</div>` : ''}
    </div>`;
  },

  galeria(b) {
    const urls = (b.imagenes_csv||'').split('\n').flatMap(l=>l.split(',')).map(s=>s.trim()).filter(Boolean).map(safeImageUrl).filter(Boolean);
    if (!urls.length) return `<div class="blk-galeria blk-animate"><div class="img-placeholder">🗂️ Galería vacía</div></div>`;
    const cols = Math.min(4, Math.max(2, parseInt(b.columnas)||3));
    return `<div class="blk-galeria blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color):''}">
      <div class="galeria-grid cols-${cols}">${urls.map(u => `<img src="${escHtml(u)}" alt="Imagen" loading="lazy"/>`).join('')}</div>
    </div>`;
  },

  kpi(b) {
    const tClass = b.tendencia==='+' ? 't-up' : b.tendencia==='-' ? 't-down' : 't-flat';
    const tLabel = b.tendencia==='+' ? '↑ Mejora' : b.tendencia==='-' ? '↓ Baja' : '→ Estable';
    const numColor = b.color_fondo || '#1d6b3e';
    return `<div class="blk-kpi-wrap blk-animate" style="${b.bg_color?'background:'+b.bg_color:''}">
      <div class="kpi-card">
        <div class="kpi-ico">${escHtml(b.icono||'🌿')}</div>
        <div class="kpi-num" style="color:${numColor}">${escHtml(b.numero||'—')}</div>
        <div class="kpi-label">${escHtml(b.label||'')}</div>
        <div class="kpi-trend ${tClass}">${tLabel}</div>
      </div>
    </div>`;
  },

  infografia(b) {
    let barras = [];
    try { barras = JSON.parse(b.barras_json||'[]'); } catch(e){}
    const maxVal = Math.max(...barras.map(bar=>bar.valor||0), 1);
    const barsHtml = barras.map(bar=>`
      <div class="inf-row">
        <div class="inf-row-label">${escHtml(bar.label||'')}</div>
        <div class="inf-track">
          <div class="inf-fill" style="width:${Math.round((bar.valor/maxVal)*100)}%;background:${safeColor(bar.color)}"></div>
        </div>
        <div class="inf-val">${bar.valor||0}</div>
      </div>`).join('');
    return `<div class="blk-infografia blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color):''}">
      ${b.titulo ? `<div class="inf-title">${escHtml(b.titulo)}</div>` : ''}
      ${barsHtml}
    </div>`;
  },

  separador(b) {
    const estilo = b.estilo || 'linea';
    let inner = '';
    if (estilo==='espacio') inner = `<div class="sep-espacio"></div>`;
    else if (estilo==='decorativo') inner = `<div class="sep-decorativo"><span>🌿</span></div>`;
    else inner = `<div class="sep-linea"></div>`;
    return `<div class="blk-separador blk-animate" style="${b.bg_color?'background:'+safeColor(b.bg_color):''}">${inner}</div>`;
  },

  noticias(b) {
    const n = Math.min(6, parseInt(b.cantidad)||3);
    const cat = b.categoria||'';
    let noticias = window._visorNoticias || [];
    if (cat) noticias = noticias.filter(x=>x.categoria===cat);
    noticias = noticias.slice(0, n);
    const items = noticias.map(noticia => `<div class="noticia-card">
      <div class="noticia-cat">${escHtml(noticia.categoria||'Noticias')}</div>
      <div class="noticia-titulo">${escHtml(noticia.titulo||'Sin título')}</div>
      <div class="noticia-fecha">📅 ${escHtml(noticia.fecha||'')}</div>
    </div>`).join('') || '<div style="color:#4a8a6a;font-size:13px">No hay noticias disponibles.</div>';
    return `<div class="blk-noticias blk-animate" style="${b.bg_color?'background:'+b.bg_color:''}">
      <div class="noticias-titulo">Noticias Recientes</div>
      <div class="noticias-grid">${items}</div>
    </div>`;
  }
};

/* ── BUILD TOC ── */
function buildTOC(bloques) {
  const encabezados = bloques
    .map((b, idx) => ({ b, idx }))
    .filter(({ b }) => b.tipo === 'encabezado' && b.titulo);

  if (!encabezados.length) return '';

  const items = encabezados.map(({ b, idx }) =>
    `<a class="toc-item" data-id="enc-${idx}" onclick="scrollToSection('enc-${idx}')">${escHtml(b.titulo)}</a>`
  ).join('');

  return `<div id="toc-panel">
    <div class="toc-title">📋 Índice</div>
    ${items}
  </div>`;
}

/* ── RENDER MAGAZINE ── */
function renderMagazine(revista) {
  const bloques = Array.isArray(revista.contenido_bloques) ? revista.contenido_bloques : [];

  if (!bloques.length) {
    return `<div class="state-center"><div class="state-inner">
      <div class="state-ico">📄</div>
      <div class="state-title">Revista sin contenido</div>
      <div class="state-msg">Esta revista no tiene bloques de contenido aún.</div>
    </div></div>`;
  }

  // Find first portada block for hero
  const portadaBlock = bloques.find(b => b.tipo === 'portada');
  const nonPortadaBlocks = portadaBlock ? bloques.filter(b => b !== portadaBlock) : bloques;

  // Build hero banner from portada
  let heroHtml = '';
  if (portadaBlock) {
    const bg = safeColor(portadaBlock.color_fondo);
    const safeHeroImg = safeImageUrl(portadaBlock.imagen_url);
    const imgTag = safeHeroImg ? `<img class="ph-img" src="${escHtml(safeHeroImg)}" alt="Portada">` : '';
    heroHtml = `<div class="portada-hero" style="background:linear-gradient(155deg,${bg},${shadeColor(bg,-50)})">
      ${imgTag}
      <div class="ph-overlay"></div>
      <div class="ph-content">
        <div class="ph-sup">IAGAMI · Revista Digital · Edición ${escHtml(revista.numero_edicion||'')}</div>
        <div class="ph-titulo">${escHtml(portadaBlock.titulo||revista.titulo||'Revista IAGAMI')}</div>
        ${portadaBlock.subtitulo ? `<div class="ph-line"></div><div class="ph-sub">${escHtml(portadaBlock.subtitulo)}</div>` : ''}
        <div class="ph-meta">
          ${revista.fecha ? `<span>📅 ${escHtml(revista.fecha)}</span>` : ''}
          ${revista.categoria ? `<span>🏷️ ${escHtml(revista.categoria)}</span>` : ''}
          <span>👁️ ${revista.visualizaciones||0} visualizaciones</span>
        </div>
      </div>
    </div>`;
  }

  const tocHtml = buildTOC(bloques);
  const canvasHtml = (portadaBlock ? nonPortadaBlocks : bloques).map((b, idx) => {
    const renderer = RENDERERS[b.tipo];
    if (!renderer) return `<div style="padding:16px 56px;background:#fff;font-size:12px;color:#4a8a6a">Bloque tipo "${escHtml(b.tipo)}" no reconocido</div>`;
    try { return renderer(b, idx); } catch(e) { console.error('[SIGAP] Bloque tipo "' + b.tipo + '" falló:', e); return ''; }
  }).join('');

  return `
    ${heroHtml}
    <div class="shell">
      ${tocHtml}
      <div class="magazine-canvas">${canvasHtml}</div>
    </div>`;
}

/* ── DOWNLOAD ── */
async function descargar() {
  if (!_revista) return;
  _revista = Object.assign({}, _revista, {descargas: (_revista.descargas||0)+1});
  await CMSDB.save('revistas', _revista);
  toast('⬇️ Descarga iniciada');
  if (_revista.pdf_url) {
    const a = document.createElement('a');
    a.href = _revista.pdf_url;
    a.download = `IAGAMI_Revista_${_revista.numero_edicion||'1'}.pdf`;
    a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } else {
    setTimeout(() => window.print(), 300);
  }
}

/* ── SCROLL ANIMATIONS ── */
function initAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.blk-animate').forEach(el => observer.observe(el));
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  _revId = params.get('id') || params.get('preview');
  const isPrint = params.get('print') === '1';

  const root = document.getElementById('viewer-root');

  if (!_revId) {
    root.innerHTML = `<div class="state-center"><div class="state-inner">
      <div class="state-ico">🔍</div>
      <div class="state-title">Revista no encontrada</div>
      <div class="state-msg">No se especificó el ID de la revista. <a href="index.html" style="color:#4ade80">Ver catálogo</a></div>
    </div></div>`;
    return;
  }

  try {
    window._visorNoticias = await CMSDB.getAll('noticias');
  } catch (e) {
    console.error('[SIGAP] Error cargando noticias:', e);
    window._visorNoticias = [];
  }

  try {
    _revista = await CMSDB.getOne('revistas', _revId);
  } catch (e) {
    root.innerHTML = `<div class="state-center"><div class="state-inner">
      <div class="state-ico">🚨</div>
      <div class="state-title">Error al cargar</div>
      <div class="state-msg">${escHtml(e.message)}. Intenta recargar.</div>
    </div></div>`;
    return;
  }

  if (!_revista) {
    root.innerHTML = `<div class="state-center"><div class="state-inner">
      <div class="state-ico">📰</div>
      <div class="state-title">Revista no disponible</div>
      <div class="state-msg">La revista solicitada no existe. <a href="index.html" style="color:#4ade80">Ver todas las ediciones</a></div>
    </div></div>`;
    return;
  }

  document.title = `${_revista.titulo} — Revista IAGAMI`;
  document.getElementById('nav-title').textContent = `${_revista.titulo} · Nº${_revista.numero_edicion||'1'}`;

  if (!isPrint) {
    _revista = Object.assign({}, _revista, {visualizaciones: (_revista.visualizaciones||0)+1});
    try { await CMSDB.save('revistas', _revista); } catch(e) { /* no-op: counter update is non-critical */ }
  }

  root.innerHTML = renderMagazine(_revista);
  setTimeout(initAnimations, 100);

  if (isPrint) setTimeout(() => window.print(), 900);
});
</script>
